name: validate-supercell

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run runner validation
        working-directory: tools/runner
        run: python main.py --repo-root ../.. --output docs/AUTOMATION_RUNNER_EXECUTION_RECORD.ci.json --print-json
